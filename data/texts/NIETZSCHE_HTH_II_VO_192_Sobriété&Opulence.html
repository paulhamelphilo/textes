<p>« 	192</p><p>LE PHILOSOPHE DE L’OPULENCE. – Un petit jardin, des figues, du fromage et, avec cela, trois ou quatre bons amis, – ce fut là l’opulence d’Épicure. »</p><p>🡪 Nietzsche, <em>Humain, trop humain</em> (1879), II, « Le voyageur et son ombre », §192<br />Trad. H. Albert rev. par A. Kremer-Marietti</p>
