<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textes d'approfondissement</title>
    <!-- Favicon owl -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🦉</text></svg>">

    <!-- Google Fonts: UI font & Serif reading fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css?v=7">
</head>

<body class="theme-mentor">
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="header-logo" id="header-logo">
                    <span class="logo-emoji">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1em" height="1em" aria-hidden="true">
                          <defs>
                            <filter id="glow-gold">
                              <feGaussianBlur stdDeviation="2.5" result="blur"/>
                              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>
                          </defs>
                          <!-- Corps -->
                          <ellipse cx="50" cy="62" rx="28" ry="32" fill="#b45309" filter="url(#glow-gold)"/>
                          <!-- Ventre -->
                          <ellipse cx="50" cy="70" rx="16" ry="20" fill="#fbbf24" opacity="0.9"/>
                          <!-- Stries ventre -->
                          <line x1="44" y1="62" x2="44" y2="84" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
                          <line x1="50" y1="60" x2="50" y2="86" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
                          <line x1="56" y1="62" x2="56" y2="84" stroke="#d97706" stroke-width="1.2" opacity="0.5"/>
                          <!-- Tete -->
                          <ellipse cx="50" cy="36" rx="22" ry="20" fill="#92400e" filter="url(#glow-gold)"/>
                          <!-- Aigrettes -->
                          <polygon points="36,20 32,8 40,18" fill="#92400e"/>
                          <polygon points="64,20 68,8 60,18" fill="#92400e"/>
                          <!-- Yeux -->
                          <circle cx="40" cy="35" r="8" fill="#fef3c7" filter="url(#glow-gold)"/>
                          <circle cx="60" cy="35" r="8" fill="#fef3c7" filter="url(#glow-gold)"/>
                          <circle cx="40" cy="35" r="5" fill="#d97706"/>
                          <circle cx="60" cy="35" r="5" fill="#d97706"/>
                          <circle cx="41" cy="34" r="2" fill="#78350f"/>
                          <circle cx="61" cy="34" r="2" fill="#78350f"/>
                          <!-- Reflets yeux -->
                          <circle cx="43" cy="32" r="1" fill="#fffbeb" opacity="0.9"/>
                          <circle cx="63" cy="32" r="1" fill="#fffbeb" opacity="0.9"/>
                          <!-- Bec -->
                          <polygon points="50,42 45,48 55,48" fill="#d97706"/>
                          <!-- Ailes -->
                          <ellipse cx="25" cy="68" rx="10" ry="18" fill="#92400e" transform="rotate(-10,25,68)"/>
                          <ellipse cx="75" cy="68" rx="10" ry="18" fill="#92400e" transform="rotate(10,75,68)"/>
                          <!-- Pattes -->
                          <line x1="43" y1="92" x2="38" y2="100" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
                          <line x1="43" y1="92" x2="43" y2="100" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
                          <line x1="57" y1="92" x2="57" y2="100" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
                          <line x1="57" y1="92" x2="62" y2="100" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </span>
                    <h1 class="logo-title-text">Textes d’approfondissement</h1>
                </div>
                <button class="btn btn-secondary back-btn" id="header-back-btn">
                    <svg class="back-arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round"
                        style="width: 1.2em; height: 1.2em; vertical-align: middle;">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg><span class="back-label">Retour aux textes</span>
                </button>
            </div>

            <!-- Search Bar Form -->
            <form id="search-form" class="search-form-header">
                <div class="search-box-header">
                    <input type="text" id="search-input" placeholder="Rechercher par numéro du texte, auteur·ice, notion..." autocomplete="off">
                    <span class="search-clear" id="search-clear">&times;</span>
                </div>
            </form>

            <div class="header-controls">
                <!-- Navigation des textes -->
                <div class="nav-controls" id="header-nav-controls">
                    <button id="nav-prev" class="nav-btn" title="Texte précédent">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round"
                            style="width: 1.2em; height: 1.2em; vertical-align: middle;">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <button id="nav-next" class="nav-btn" title="Texte suivant">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round"
                            style="width: 1.2em; height: 1.2em; vertical-align: middle;">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <!-- Font size adjustment -->
                <div class="font-controls" id="header-font-controls">
                    <button id="font-dec" class="font-btn" title="Diminuer la police">A-</button>
                    <button id="font-inc" class="font-btn" title="Agrandir la police">A+</button>
                </div>

                <!-- Original PDF Link -->
                <a id="pdf-download-link" href="#" target="_blank" class="btn btn-secondary" download
                    title="Ouvrir le PDF original">
                    📂<span class="hide-mobile"> PDF</span>
                </a>

                <!-- Dark mode toggle -->
                <button id="dark-mode-toggle" class="icon-btn" title="Changer le mode de couleur">
                    <span class="icon-light">☀️</span>
                    <span class="icon-dark">🌙</span>
                </button>
            </div>
        </header>

        <!-- Main Workspace Layout -->
        <main class="app-layout">

            <!-- Central panel: Results List OR Reading view -->
            <section class="content-panel">
                <!-- Search stats & active filters banner -->
                <div class="results-bar" id="results-bar">
                    <div class="results-count" id="results-count">Initialisation...</div>
                </div>

                <!-- Card grid of results -->
                <div class="cards-grid" id="cards-grid">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                        <p>Chargement de la base de textes...</p>
                    </div>
                </div>

                <!-- Reading View (hidden by default) -->
                <article class="reader-view" id="reader-view" style="display: none;">

                    <!-- Text Analysis Summary Box -->
                    <header class="text-analysis-card" id="text-analysis-card">
                        <div class="analysis-meta">
                            <span class="text-id-badge" id="reader-text-id">N°</span>
                            <span class="text-author" id="reader-author">Auteur</span>
                            <div class="text-notions-badges" id="reader-notions-badges"></div>
                        </div>
                        <h2 class="text-title" id="reader-title">Titre du texte</h2>

                        <div class="analysis-grid">
                            <div class="analysis-block thesis-block">
                                <h3>Thèse synthétique</h3>
                                <p id="reader-thesis">Phrase de thèse...</p>
                            </div>
                            <div class="analysis-block summary-block">
                                <h3>Résumé</h3>
                                <p id="reader-summary">Résumé synthétique...</p>
                            </div>
                        </div>
                    </header>

                    <!-- Text body content -->
                    <section class="text-body" id="reader-body">
                        Chargement du texte...
                    </section>
                </article>
            </section>
        </main>

        <div class="footer-credit">PH-2026</div>
    </div>

    <!-- Load marked library for safe markdown rendering (if any texts have basic markdown formatting) -->
    <script src="js/app.js?v=11"></script>
</body>

</html>
